services:
  - type: web
    name: questmatch-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: TURSO_URL
        fromContext: secret
      - key: TURSO_AUTH_TOKEN
        fromContext: secret
      - key: NODE_ENV
        value: production

  - type: static
    name: questmatch-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://questmatch-backend.onrender.com/api
