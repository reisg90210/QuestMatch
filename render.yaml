services:
  - type: web
    name: questmatch-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: TURSO_URL
        value: sqlite://local.db
      - key: TURSO_AUTH_TOKEN
        value: placeholder

  - type: static
    name: questmatch-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
